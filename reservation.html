<!DOCTYPE html> 
<html lang="en">                
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reservations - The Eww Cafe</title>
</head>
<body>
    <h1>No kidding! Make a Reservation at The Eww Cafe you will regret it:3</h1> 
    <p>To make a reservation, please fill out the form below. But you should not do it at all!</p>
    <form action="reservation.html" method="post"> 
        <label>Name:</label>
        <input type="text" placeholder="ofc your name" required>
        <br><br>
        <label>Email:</label>
        <input type="email" placeholder="not my email, yours" required>
        <br><br>
        <label>Phone:</label>
        <input type="tel" placeholder="shawty yes your cell no" required>
        <br><br>
        <label>When you coming,ehh?</label>
        <br><br>
        <label>Date:</label>
        <input type="date" placeholder="date" required>
        <br><br>
        <label>Time:</label>
        <input type="time" placeholder="time" required>
        <br><br>
        <label>You with frens?:</label>
        <input type="number" placeholder="party size" min="1" max="20" required>
        <br><br>
        <label>Eww Requests:</label>
        <select name="special_requests">
            <option value="None">You have no requests, how boring</option>
            <option value="Fun">you would disturb all the customers</option>
            <option value="Sad day">You wanna cry</option>
            <option value="Crash out">You would crash out so bad</option>
            <option value="No fun">You will have no fun at all</option>
            <option value="Eww">You would be very annoying to Eww members</option>
        </select>
        <br><br>
        <label>Secret Code i bet that you don't have:</label>
        <input type="text" placeholder="susshhh">
        <br><br>
        <button type="submit">Submit Reservation</button>
    </form>
</body>
</html>
